# Test-specific configuration to reduce verbose output
# This file is used only during test execution

# Reduce logging verbosity for tests
logging.level.org.springframework.test.util.ReflectionTestUtils=WARN
logging.level.org.springframework.test=WARN
logging.level.org.springframework=WARN

# Reduce Maven Surefire logging
logging.level.org.apache.maven.surefire=WARN

# Reduce Jackson logging
logging.level.com.fasterxml.jackson=WARN

# Reduce Slack API logging
logging.level.com.slack.api=WARN

# Set root logging to WARN to reduce noise
logging.level.root=WARN

# Disable debug logging for tests
logging.level.com.slackbuidler=INFO 