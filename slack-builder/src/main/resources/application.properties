# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/slack-builder
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# SQL Scripts
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Server Configuration
server.port=8080

# Application Configuration
spring.application.name=slack-builder

# Logging Configuration
logging.level.com.slackbuidler=DEBUG
logging.level.org.springframework.web=DEBUG

# Enable debug endpoints (for development)
management.endpoints.web.exposure.include=health,info 

# Slack — supply real values via environment (do not commit tokens)
slack.bot.token=${SLACK_BOT_TOKEN:}
slack.channel.id=${SLACK_CHANNEL_ID:}
slack.signing.secret=${SLACK_SIGNING_SECRET:}