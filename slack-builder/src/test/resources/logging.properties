# Test logging configuration
# This file controls logging output during test execution

# Set root logger to WARN level
handlers=java.util.logging.ConsoleHandler
.level=WARN

# Configure console handler
java.util.logging.ConsoleHandler.level=WARN
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%4$s: %5$s%6$s%n

# Set specific logger levels
com.slackbuidler.level=INFO
org.springframework.test.level=WARN
org.springframework.test.util.ReflectionTestUtils.level=WARN
org.springframework.level=WARN
com.fasterxml.jackson.level=WARN
com.slack.api.level=WARN
org.apache.maven.surefire.level=WARN 